<div style="margin-top: 10px; width: 100%">
    <p-floatlabel variant="on" style="width: 100%">
        <!--p-select [value]="value()"
                  [id]="id()"
                  [disabled]="disabled()"
                  [options]="options()"
                  [optionLabel]="optionLabel()"
                  [optionValue]="optionValue()"
                  [filter]="showFilter()"
                  filterBy="name"
                  class="select-style"/-->
        <label [for]="id()">
            {{ label() | translate }}
            @if (required()) {
                <span>*</span>
            }
        </label>
    </p-floatlabel>
    @if (formObject().invalid() && formObject().dirty()) {
        <p-message severity="error" size="small" variant="simple">{{ getErrorMessage() | translate }}</p-message>
    }
</div>
