<div style="margin-top: 10px; width: 100%">
    <p-inputgroup>
        <p-floatlabel variant="on" style="width: 100%">
            <p-inputNumber
                [formControl]="formControl"
                [inputId]="id()"
                style="width: 100%"
                [suffix]="suffix()"
                [minFractionDigits]="minFractionDigits()"
                [maxFractionDigits]="maxFractionDigits()"
                [autocomplete]="autocomplete()"
                [disabled]="disabled()"
                (onBlur)="onBlur($event)"
                (contextmenu)="handleRightClick($event)"
                [attr.readonly]="isReadOnly()" />
            <label [for]="id()">
                {{ label() | translate }}
                @if (required()) {
                    <span>*</span>
                }
            </label>
        </p-floatlabel>
        @if (unit()) {
            <p-inputgroup-addon>{{ unit() }}</p-inputgroup-addon>
        }
    </p-inputgroup>

    @if (formControl?.invalid && formControl?.dirty) {
        <p-message severity="error" size="small" variant="simple">{{ getErrorMessage() | translate: { minLength: minLength(), maxLength: maxLength(), min: min(), max: max(), name: name() } }}</p-message>
    }
</div>

<babs-history-dialog [id]="id()" [visible]="this.showHistoryDialog()" (showHistoryDialog)="this.showHistoryDialog.set($event)" (cancel)="cancelHistoryDialog()" />
